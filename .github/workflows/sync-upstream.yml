name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: command -v jq || sudo apt-get install -y jq

      - name: Run sync script
        run: ./.github/scripts/sync-upstream.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard plugins/ external_plugins/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json plugins/ external_plugins/
          git commit -m "chore: sync with upstream marketplace"
          git push
